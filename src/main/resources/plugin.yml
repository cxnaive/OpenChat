name: PlayerChat
main: cn.handyplus.chat.PlayerChat
version: 3.3.5
author: handy
api-version: 1.13
softdepend: [ PlaceholderAPI, DiscordSRV, AuthMe, CatSeedLogin, OauthLogin ]
website: https://ricedoc.handyplus.cn/wiki/PlayerChat/log/
description: 一款有点好用的聊天插件
folia-supported: true
commands:
  playerChat:
    description: 一款有点好用的聊天插件
    aliases: [ plc ]
  channel:
    description: 频道管理
    usage: /channel [admin|频道名]
  lb:
    description: 一款有点好用的聊天插件
    aliases: [ lb ]
  broadcast:
    description: 公告系统主命令
    usage: /broadcast <子命令> [参数]
    aliases: [ bc, announce, ann, msg ]
    permission: messageservice.use
permissions:
  playerChat.*:
    description: 一款有点好用的聊天插件
    children:
      playerChat.reload: true
      playerChat.give: true
      playerChat.take: true
      playerChat.set: true
      playerChat.look: true
      playerChat.color: true
      playerChat.channel: true
      playerChat.item: true
      playerChat.tell: true
      playerChat.clearBossBar: true
      playerChat.ignore: true
      playerChat.ignoreList: true
      playerChat.removeIgnore: true
      playerChat.vote: true
      playerChat.convert: true
      playerChat.ai.ignore: true
      playerChat.nick: true
      playerChat.nick.other: true
      playerChat.mute: true
      playerChat.unmute: true
      messageservice.admin: true
  playerChat.reload:
    description: 重新加载配置
    default: op
  playerChat.give:
    description: 给予喇叭
    default: op
  playerChat.take:
    description: 拿走喇叭
    default: op
  playerChat.set:
    description: 设置喇叭
    default: op
  playerChat.look:
    description: 查看喇叭
    default: op
  playerChat.color:
    description: 颜色权限
    default: op
  playerChat.channel:
    description: 切换频道
    default: true
  playerChat.item:
    description: 查看展示物品
    default: true
  playerChat.chat.default:
    description: 默认频道查看权限
    default: true
  playerChat.use.default:
    description: 默认频道使用权限
    default: true
  playerChat.tell:
    description: 私聊权限
    default: true
  playerChat.chat.tell:
    description: 私信频道查看权限
    default: true
  playerChat.use.tell:
    description: 私信频道使用权限
    default: true
  playerChat.clearBossBar:
    description: 移除全部BossBar消息
    default: op
  playerChat.ignore:
    description: 屏蔽
    default: true
  playerChat.ignoreList:
    description: 已屏蔽玩家列表
    default: true
  playerChat.removeIgnore:
    description: 移除屏蔽
    default: true
  playerChat.vote:
    description: 投票
    default: true
  playerChat.convert:
    description: 转化数据库
    default: op
  playerChat.ai.ignore:
    description: 忽略AI审核的权限
    default: op
  playerChat.nick:
    description: 设置自己的昵称
    default: op
  playerChat.nick.other:
    description: 设置其他玩家的昵称
    default: op
  playerChat.mute:
    description: 禁言玩家
    default: op
  playerChat.unmute:
    description: 解除禁言
    default: op
  # ==================== 公告系统权限（原 MessageService） ====================
  messageservice.use:
    description: 使用公告命令的基础权限
    default: op
  messageservice.create:
    description: 创建公告
    default: op
  messageservice.edit:
    description: 编辑公告
    default: op
  messageservice.delete:
    description: 删除公告
    default: op
  messageservice.list:
    description: 查看公告列表
    default: op
  messageservice.send:
    description: 发送公告
    default: op
  messageservice.sendnow:
    description: 立即发送消息
    default: op
  messageservice.broadcast:
    description: 广播消息
    default: op
  messageservice.preview:
    description: 预览公告
    default: op
  messageservice.reload:
    description: 重新加载配置
    default: op
  messageservice.gui:
    description: 使用图形化界面
    default: op
  messageservice.admin:
    description: 所有管理权限
    default: op
    children:
      messageservice.use: true
      messageservice.create: true
      messageservice.edit: true
      messageservice.delete: true
      messageservice.list: true
      messageservice.send: true
      messageservice.sendnow: true
      messageservice.broadcast: true
      messageservice.preview: true
      messageservice.reload: true
      messageservice.gui: true