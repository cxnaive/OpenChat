# 第一次修改语言文件,需重启生效
language: zh_CN

# 子服标识，群组服需先配置这个
server: "lobby"

# 子服自定义名称
# 可以用 papi变量 %playerChat_server_name% 读取 或者内部变量 ${serverName} 读取
serverName: ""

# 命令别名
# 格式: 别名: "替换为"
# 例如: /tell xxx -> /plc tell xxx
commandAlias:
  tell: "plc tell"
  msg: "plc tell"
  mute: "plc mute"
  unmute: "plc unmute"

# 玩家第一次登录后的默认频道
# 注意 如果修改为其他频道,请把对应的权限提前给予 查看: playerChat.chat.频道名 使用: playerChat.use.频道名
firstLoginChatDefault: "default"

# 是否开启 AI 审核
ai:
  # 是否开启
  enable: false
  # AI一天警告最大次数
  chatMaxCount: 3
  # AI投票成功人数
  voteMaxNumber: 5
  # AI投票成功后执行的指令
  command:
    - "plc mute ${player} 5m"
    - "lb 全服大喇叭 &a${player}&c因违规发言,已被投票禁言5分钟"

# 聊天冷却时间(单位秒)(可无限扩展和修改子节点，权限格式: playerChat.chatTime.vip1)
# 0为关闭状态
chatTime:
  # 默认玩家的时间
  default: 0
  # vip1的上限 需要权限 playerWarp.delayTime.vip1
  vip1: 0
  # vip2的上限 需要权限 playerWarp.delayTime.vip2
  vip2: 0
  # vip3的上限 需要权限 playerWarp.delayTime.vip3
  vip3: 0

# 聊天黑名单
blacklist:
  - '操'
  - '草'
  - 'cao'
  - '%'

# 是否开启更新提醒,建议开启
isCheckUpdate: true

# op登录时候是否发送更新提醒
isCheckUpdateToOpMsg: true

# ============================================
# 公告模块配置（原 MessageService）
# ============================================

# 调试设置
debug:
  # 启用调试模式（输出详细的跨服消息日志）
  enabled: false

# 性能设置
performance:
  # 每tick最大处理公告数
  max-per-tick: 50
  # 批量发送玩家数
  batch-size: 100
  # 队列检查间隔(tick)
  queue-check-interval: 20

# 格式设置
format:
  # 公告前缀
  prefix: "&6[公告] &f"
  # 默认颜色
  default-color: "&e"
  # 日期格式
  date-format: "yyyy-MM-dd HH:mm"

# 多线程设置
threading:
  # 启用区域检查
  region-check-enabled: true
  # 回退调度器类型 (async 或 sync)
  fallback-scheduler: async

# 跨服同步设置
cross-server:
  # 启用跨服同步
  enabled: false
  # 服务器名称标识 (每个子服务器必须唯一)
  server-name: "server1"
  # 定期同步间隔（秒，0表示禁用）
  sync-interval: 5
  # 可用区服列表 (用于GUI选择)
  available-servers:
    - "server1"
    - "server2"

# 数据备份设置
backup:
  # 启用自动备份
  auto-enabled: true
  # 备份间隔（小时）
  interval-hours: 24
  # 保留备份天数
  keep-days: 7